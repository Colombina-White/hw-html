<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式個人網頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-view">
        <h1>這是【桌電版】介面</h1>
        <div class="container">
            <section>
                <h2>個人簡介</h2>
                <p>你好！我是資工系的學生，目前就讀於朝陽科技大學資工系。</p>
            </section>
            <hr>
            <section>
                <h2>興趣專長</h2>
                <p>擅長 python 後端開發、 Linux 系統管理/Ansible 自動化運維以及 Discord 機器人開發。</p>
            </section>
        </div>
    </div>

    <div class="mobile-view">
        <h1>這是【手機版】介面</h1>
        <div class="tab-buttons">
            <button onclick="showContent('intro')">個人簡介</button>
            <button onclick="showContent('skills')">興趣專長</button>
        </div>

        <div id="intro" class="tab-content">
            <h2>個人簡介 (Mobile)</h2>
            <p>你好！我是資工系的學生，目前就讀於朝陽科技大學資工系。</p>
        </div>

        <div id="skills" class="tab-content" style="display:none;">
            <h2>興趣專長 (Mobile)</h2>
            <p>熱衷於《崩壞：星穹鐵道》數值分析與技術專案製作。</p>
        </div>
    </div>

    <script>
        function showContent(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
